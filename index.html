<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schnappt - Procedural Maze</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        background-color: #000;
        border: 2px solid #fff;
      }
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        text-align: center;
      }
      #overlay h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      #overlay button {
        padding: 0.75rem 1.5rem;
        font-size: 1.5rem;
        background-color: #fff;
        color: #000;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      #overlay button:hover {
        background-color: #ccc;
      }
      .hidden {
        display: none !important;
      }
      #toast {
        position: absolute;
        bottom: 20px;
        background-color: rgba(255, 255, 255, 0.9);
        color: #000;
        padding: 10px 20px;
        border-radius: 5px;
        font-weight: bold;
        z-index: 20;
        transition: opacity 0.5s;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
      <div id="overlay">
        <h1 id="overlay-text">SCHNAPPT</h1>
        <button id="start-button">CLICK TO START</button>
      </div>
      <div id="toast" class="hidden"></div>
    </div>
    <script type="module" src="/src/game.ts"></script>
  </body>
</html>
